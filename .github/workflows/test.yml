name: Test Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check dist folder exists
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "dist/index.js not found!"
            exit 1
          fi
          echo "Build successful - dist/index.js exists"

      - name: Check dist is up to date
        run: |
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt "0" ]; then
            echo "::error::dist/ 폴더가 최신 상태가 아닙니다. 'npm run build'를 실행하고 dist/ 폴더를 커밋해주세요."
            echo ""
            echo "변경된 파일:"
            git diff --stat dist/
            exit 1
          fi
          echo "dist/ 폴더가 최신 상태입니다."
