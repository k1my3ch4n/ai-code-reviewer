name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Determine version bump
        id: version
        run: |
          set -e

          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest release tag: $LATEST_TAG"

          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=%s)
          if [ -z "$COMMITS" ]; then
            echo "No commits since $LATEST_TAG, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^[a-z]+(\([^)]*\))?!:|BREAKING CHANGE'; then
              BUMP="major"
              break
            elif echo "$line" | grep -qE '^feat(\([^)]*\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$line" | grep -qE '^(fix|perf)(\([^)]*\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No feat/fix/perf commits since $LATEST_TAG, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION (bump: $BUMP)"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "major_tag=v${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.version.outputs.skip != 'true'
        run: npm ci

      - name: Build dist
        if: steps.version.outputs.skip != 'true'
        run: npm run build

      - name: Bump package.json version
        if: steps.version.outputs.skip != 'true'
        run: |
          NEW_VER="${{ steps.version.outputs.new_version }}"
          npm pkg set version="${NEW_VER#v}"

      - name: Commit, tag and push release
        if: steps.version.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          MAJOR_TAG: ${{ steps.version.outputs.major_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist package.json
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag -a "${NEW_VERSION}" -m "Release ${NEW_VERSION}"
          git tag -f "${MAJOR_TAG}" "${NEW_VERSION}"
          git push origin HEAD:main
          git push origin "${NEW_VERSION}"
          git push origin "${MAJOR_TAG}" --force

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.new_version }}" \
            --title "${{ steps.version.outputs.new_version }}" \
            --generate-notes \
            --notes-start-tag "${{ steps.version.outputs.previous_tag }}" \
            --verify-tag
